<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FanStream Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap');

:root {
  --bg:      #08090c;
  --surface: #111318;
  --card:    #181c24;
  --border:  #232839;
  --accent:  #e8ff00;
  --accent2: #00d4ff;
  --live:    #ff3c3c;
  --text:    #e8eaf0;
  --muted:   #6b7280;
  --r:       10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:grid;grid-template-rows:auto 1fr}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-.5px;color:var(--accent)}
.logo span{color:var(--text)}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(255,60,60,.12);border:1px solid rgba(255,60,60,.3);color:var(--live);font-size:.67rem;font-weight:700;letter-spacing:1.5px;padding:4px 10px;border-radius:20px;text-transform:uppercase}
.dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

main{display:grid;grid-template-columns:1fr 310px;overflow:hidden}

/* ── Player ── */
.player-panel{display:flex;flex-direction:column;padding:16px;gap:11px;overflow-y:auto}

.video-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
video{width:100%;height:100%;display:block}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,9,12,.88);gap:12px;transition:opacity .2s}
.overlay.gone{opacity:0;pointer-events:none}
.play-circle{width:62px;height:62px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s}
.play-circle:hover{transform:scale(1.06)}
.play-circle svg{margin-left:4px}
.overlay-hint{font-size:.82rem;color:var(--muted)}

.now-playing{display:none;align-items:center;gap:12px;padding:11px 13px;background:var(--card);border-radius:var(--r);border:1px solid var(--border)}
.np-logo{width:50px;height:50px;border-radius:7px;object-fit:cover;background:var(--surface);flex-shrink:0;border:1px solid var(--border)}
.np-meta{flex:1;min-width:0}
.np-group{font-size:.63rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.np-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-lang{font-size:.7rem;color:var(--muted);margin-top:3px}
.lang-pill{display:inline-block;padding:1px 7px;border-radius:4px;background:var(--surface);border:1px solid var(--border);font-size:.64rem;color:var(--accent2);margin-left:3px}

.status-bar{display:none;align-items:center;gap:8px;border-radius:var(--r);padding:9px 13px;font-size:.78rem}
.status-bar.loading{display:flex;background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.2);color:var(--accent2)}
.status-bar.error{display:flex;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.22);color:#ff7070}
.spin{width:15px;height:15px;border:2px solid rgba(0,212,255,.2);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Sidebar ── */
.sidebar{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:13px 15px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem}
.ch-count{font-size:.68rem;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2px 9px}

.tabs{display:flex;gap:5px;padding:8px 11px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tab{padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .12s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

.ch-list{flex:1;overflow-y:auto;padding:5px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.ch-list::-webkit-scrollbar{width:3px}
.ch-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.ch-item{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;border-left:2px solid transparent;transition:background .1s,border-color .1s}
.ch-item:hover{background:rgba(255,255,255,.03)}
.ch-item.on{background:rgba(232,255,0,.05);border-left-color:var(--accent)}
.ch-logo{width:40px;height:40px;border-radius:6px;object-fit:cover;background:var(--card);flex-shrink:0;border:1px solid var(--border)}
.ch-info{flex:1;min-width:0}
.ch-tag{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.ch-name{font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.ch-lang{font-size:.65rem;color:var(--muted);margin-top:1px}
.ch-btn{width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s,border-color .12s}
.ch-item:hover .ch-btn,.ch-item.on .ch-btn{background:var(--accent);border-color:var(--accent)}
.ch-item:hover .ch-btn svg path,.ch-item.on .ch-btn svg path{fill:#000!important}

@media(max-width:680px){
  html,body{height:auto;overflow:auto}
  main{grid-template-columns:1fr;overflow:visible}
  .player-panel{padding:10px}
  .sidebar{border-left:none;border-top:1px solid var(--border);height:55vh}
}
</style>
</head>
<body>

<header>
  <div class="logo">Fan<span>Stream</span></div>
  <div class="live-badge"><div class="dot"></div>Live</div>
</header>

<main>
  <section class="player-panel">
    <div class="video-wrap">
      <video id="vid" controls playsinline></video>
      <div class="overlay" id="overlay">
        <div class="play-circle" id="overlayBtn">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 4l14 8-14 8V4z" fill="#000"/></svg>
        </div>
        <div class="overlay-hint">Select a channel to start watching</div>
      </div>
    </div>

    <div class="status-bar" id="statusBar"><div class="spin" id="spin"></div><span id="statusMsg"></span></div>

    <div class="now-playing" id="np">
      <img class="np-logo" id="npLogo" src="" alt=""/>
      <div class="np-meta">
        <div class="np-group" id="npGroup"></div>
        <div class="np-title" id="npTitle"></div>
        <div class="np-lang">Language: <span class="lang-pill" id="npLang"></span></div>
      </div>
    </div>
  </section>

  <aside class="sidebar">
    <div class="sb-head">
      <span class="sb-title">Channels</span>
      <span class="ch-count" id="chCount">Loading…</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="ch-list" id="chList"></div>
  </aside>
</main>

<script>
const vid       = document.getElementById("vid");
const overlay   = document.getElementById("overlay");
const statusBar = document.getElementById("statusBar");
const statusMsg = document.getElementById("statusMsg");
const spin      = document.getElementById("spin");

function setStatus(type, msg) {
  statusBar.className = "status-bar" + (type ? " " + type : "");
  statusMsg.textContent = msg;
  spin.style.display = type === "loading" ? "block" : "none";
}

async function loadPlaylist() {
  const res  = await fetch("/api/playlist");
  const text = await res.text();
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const channels = [];

  for (let i = 0; i < lines.length; i++) {
    if (!lines[i].startsWith("#EXTINF")) continue;
    const info    = lines[i];
    const urlLine = lines[i + 1] || "";
    if (!urlLine || urlLine.startsWith("#")) continue;

    const attr = k => { const m = info.match(new RegExp(k + '="([^"]*)"')); return m ? m[1] : ""; };
    const nameMatch = info.match(/,(.+)$/);
    const full  = nameMatch ? nameMatch[1].trim() : "Stream";
    const parts = full.split("|");
    const lang  = parts[0].trim();
    const title = parts.slice(1).join("|").trim() || full;

    const [rawUrl, ...hParts] = urlLine.split("|");
    const headers = {};
    hParts.forEach(p => {
      const eq = p.indexOf("=");
      if (eq > -1) headers[p.slice(0, eq).trim()] = p.slice(eq + 1).trim();
    });

    channels.push({ id: channels.length, title, lang, logo: attr("tvg-logo"), group: attr("group-title") || "General", rawUrl: rawUrl.trim(), headers });
  }
  return channels;
}

function proxyUrl(rawUrl, headers) {
  return `/api/proxy?url=${encodeURIComponent(rawUrl)}&headers=${encodeURIComponent(JSON.stringify(headers))}`;
}

let hls = null;

function playChannel(ch) {
  setStatus("loading", "Connecting to stream…");
  overlay.classList.add("gone");
  if (hls) { hls.destroy(); hls = null; }

  const src = proxyUrl(ch.rawUrl, ch.headers);

  if (Hls.isSupported()) {
    hls = new Hls({ debug: false });
    hls.loadSource(src);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      setStatus("", "");
      vid.play().catch(() => {});
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) setStatus("error", `Stream error (${data.details}) — link may be expired.`);
    });
  } else if (vid.canPlayType("application/vnd.apple.mpegurl")) {
    vid.src = src;
    setStatus("", "");
    vid.play().catch(() => {});
  } else {
    setStatus("error", "HLS not supported in this browser.");
  }

  document.getElementById("np").style.display = "flex";
  document.getElementById("npLogo").src  = ch.logo;
  document.getElementById("npGroup").textContent = ch.group;
  document.getElementById("npTitle").textContent = ch.title;
  document.getElementById("npLang").textContent  = ch.lang;
}

function buildUI(channels) {
  document.getElementById("chCount").textContent = `${channels.length} streams`;
  const tabsEl = document.getElementById("tabs");
  const listEl = document.getElementById("chList");
  let activeId = -1, currentGroup = "All";

  const groups = ["All", ...new Set(channels.map(c => c.group))];

  function renderList(group) {
    currentGroup = group;
    const items = group === "All" ? channels : channels.filter(c => c.group === group);
    listEl.innerHTML = "";
    items.forEach(ch => {
      const el = document.createElement("div");
      el.className = "ch-item" + (ch.id === activeId ? " on" : "");
      el.innerHTML = `
        <img class="ch-logo" src="${ch.logo}" alt="" onerror="this.style.visibility='hidden'"/>
        <div class="ch-info">
          <div class="ch-tag">${ch.group}</div>
          <div class="ch-name">${ch.title}</div>
          <div class="ch-lang">${ch.lang}</div>
        </div>
        <div class="ch-btn">
          <svg width="10" height="10" viewBox="0 0 24 24"><path d="M6 4l14 8-14 8V4z" fill="${ch.id === activeId ? '#000' : '#9ca3af'}"/></svg>
        </div>`;
      el.onclick = () => { activeId = ch.id; renderList(currentGroup); playChannel(ch); };
      listEl.appendChild(el);
    });
  }

  groups.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "tab" + (g === "All" ? " on" : "");
    btn.textContent = g;
    btn.onclick = () => {
      tabsEl.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
      btn.classList.add("on");
      renderList(g);
    };
    tabsEl.appendChild(btn);
  });

  renderList("All");
}

document.getElementById("overlayBtn").onclick = () => {
  document.querySelector(".ch-item")?.click();
};

loadPlaylist().then(buildUI).catch(e => setStatus("error", "Could not load playlist: " + e.message));
</script>
</body>
</html>
